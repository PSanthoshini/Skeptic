services:
  - type: web
    name: skeptic-api
    env: node
    plan: starter
    buildCommand: "cd server && npm install && npm run build"
    startCommand: "cd server && npm run start"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://skeptic-ai.com"
      - key: GROQ_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
    autoDeploy: false

  - type: web
    name: skeptic-frontend
    env: static
    plan: free
    buildCommand: "cd client && npm install && npm run build"
    staticPublishPath: "./client/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://skeptic-api.onrender.com"
    autoDeploy: false
